services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./server/cone_model.pt:/app/cone_model.pt:ro

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_POSE_SERVER_URL: "http://179.1.87.46:8000"
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend
